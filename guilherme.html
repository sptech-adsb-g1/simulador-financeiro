<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calculadora de Consumo da Pulseira</title>
</head>
<body>
  <style>
    html,
    body {
      min-height: 100%;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;

      margin: 0;

      font-family: Arial, Helvetica, sans-serif;
      color: white;
      text-align: center;

      background-image: url(https://img.freepik.com/vetores-premium/fundo-de-ilustracao-vetorial-de-clinica-de-padrao-medico-sem-costura-papel-de-parede-de-saude-apresentacao-de-negocios-de-textura-repetida-bonita_153454-7404.jpg);
    }

    .main-container {
      display: flex;
      justify-content: center;
      align-items: center;

      width: 30%;
      height: auto;
      margin: 40px 0;
    }

    .form-section {
      display: flex;
      flex-direction: column;
      align-items: center;

      width: 100%;
      height: auto;

      padding: 60px 0px 120px 0px;

      background-color: #d00000;
      border-radius: 5px;
    }

    .paragraph-group {
      display: flex;
      flex-direction: column;
      align-items: center;

      margin-bottom: 20px;
    }

    .form-description {
      margin: 5px;
    }

    .form-input {
      padding: 10px 20px;

      margin-top: 5px;

      border-radius: 20px;
      border: none;
    }

    .button-group {
      display: flex;
      flex-direction: column;

      margin-top: 35px;
      margin-bottom: 30px;
    }

    .btn {
      width: 200px;

      padding: 10px 20px;
      margin: 5px;

      background-color: white;
      color: #bf0603;

      border-radius: 20px;
      border: none;
    }

    .form-section h1 {
      margin: 0;
      margin-bottom: 15px;
    }

    .div-mensagem {
      margin: 20px;
    }
  </style>

  <div class="main-container">
    <div class="form-section">
      <h1>Calculadora de Consumo<br />da Pulseira</h1>

      <div class="paragraph-group">
        <p class="form-description">Capacidade da bateria (mAh):</p>
        <input type="number" id="input_bateria" class="form-input" />
      </div>

      <div class="paragraph-group">
        <p class="form-description">Consumo da pulseira (mA):</p>
        <input type="number" id="input_consumo" class="form-input" />
      </div>

      <div class="paragraph-group">
        <p class="form-description">Horas de uso por dia:</p>
        <input type="number" id="input_horas" class="form-input" />
      </div>

      <div class="paragraph-group">
        <p class="form-description">Custo de energia por hora (R$):</p>
        <input type="number" id="input_custo" class="form-input" />
      </div>

      <div class="button-group">
        <button class="btn" onclick="calcular()">Calcular</button>
      </div>

      <div class="div-mensagem" id="div_mensagem"></div>
    </div>
  </div>

  <script>
    function calcular() {
      let bateria   = Number(input_bateria.value);
      let consumo   = Number(input_consumo.value);
      let horas     = Number(input_horas.value);
      let custoHora = Number(input_custo.value);

      let duracao        = bateria / consumo;
      let consumo_diario = consumo * horas;
      let consumo_mensal = consumo_diario * 30;
      let custo_diario   = horas * custoHora;
      let custo_mensal   = custo_diario * 30;

      div_mensagem.innerHTML =
        `Duração estimada da bateria: ${duracao} horas <br>
         Consumo diário: ${consumo_diario} mAh <br>
         Consumo mensal: ${consumo_mensal} mAh <br>
         Custo diário de energia: R$ ${custo_diario} <br>
         Custo mensal de energia: R$ ${custo_mensal}`;
    }
  </script>
</body>
</html>
