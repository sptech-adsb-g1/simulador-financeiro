<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculadora de Economia com Redução de Complicações</title>
  </head>
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      height: 100vh;
    }
  </style>
  <body>
    <div>
      <h1>Calculadora de Economia com Redução de Complicações</h1>
      <div>
        <label for="inputQuantidadeLeitosUTI">Número de leitos na UTI:</label>
        <br />
        <br />
        <input type="number" id="inputQuantidadeLeitosUTI" />
      </div>
      <br />
      <div>
        <label for="inputTaxaComplicacoes"
          >Taxa média de complicações por <br />
          falha de monitoramento (%):</label
        >
        <br />
        <br />
        <input type="number" id="inputTaxaComplicacoes" />
      </div>
      <br />
      <div>
        <label for="inputCustoComplicacoes"
          >Custo médio por <br />complicação (R$):</label
        >
        <br />
        <br />
        <input type="number" id="inputCustoComplicacoes" />
      </div>
      <br />
      <div>
        <button onclick="Calcular()">Calcular</button>
      </div>
      <br />
      <div id="divMensagem"></div>
    </div>
  </body>
</html>
<script>
  function Calcular() {
    let QuantidadeLeitosUTI = Number(inputQuantidadeLeitosUTI.value);
    let TaxaComplicacoes = Number(inputTaxaComplicacoes.value) / 100;
    let CustoComplicacoes = Number(inputCustoComplicacoes.value);

    let percentualReducao = 20 / 100;

    let casosEvitados = 0;
    let economiaAnual = 0;

    casosEvitados = QuantidadeLeitosUTI * TaxaComplicacoes * percentualReducao;
    economiaAnual = casosEvitados * CustoComplicacoes;

    divMensagem.innerHTML = `
            Estimativa de casos evitados: ${casosEvitados} 
            <br/>
            Estimativa de economia anual: R$${economiaAnual}
        `;
  }
</script>
