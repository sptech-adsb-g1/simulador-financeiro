<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculo de Investimento - Live Saver</title>
</head>
<body>
    <h1>Calculadora Financeira - Life Saver</h1>

    <p>Quantidade de pacientes na UTI por mês:</p>
    <input type="number" id="ipt_pacientes"><br><br>

    <p>Custo médio por paciente (R$):</p>
    <input type="number" id="ipt_custo"><br><br>

    <p>Redução estimada de custos com o Life Saver (%):</p>
    <input type="number" id="ipt_reducao"><br><br>

    <p>Investimento no sistema Life Saver (R$):</p>
    <input type="number" id="ipt_investimento"><br><br>

    <button onclick="calcular()">Calcular Economia</button><br><br>

    <div id="div_mensagem"></div>
</body>
</html>
<script>
    function calcular(){

        let pacientes = Number(ipt_pacientes.value)
        let custo = Number(ipt_custo.value)
        let reducaoPercent = Number(ipt_reducao.value)

        let reducao = reducaoPercent / 100

        let investimento = Number(ipt_investimento.value)

        let custoMensal = pacientes * custo

        let economiaMensal = custoMensal * reducao

        let economiaAnual = economiaMensal * 12

        let roi = (economiaAnual / investimento) * 100

        div_mensagem.innerHTML = `
            <h3>Resultado Financeiro</h3>

            Custo mensal atual da UTI: <b>R$ ${custoMensal.toFixed(2)}</b><br><br>

            Economia mensal estimada: <b>R$ ${economiaMensal.toFixed(2)}</b><br>

            Economia anual estimada: <b>R$ ${economiaAnual.toFixed(2)}</b><br>

            Retorno sobre investimento (ROI): <b>${roi.toFixed(2)}%</b>
            `
    }
</script>
