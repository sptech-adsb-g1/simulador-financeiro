<!doctype html>

<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculadora de Economia com Redução de Complicações</title>
  </head>
  <body>
    <style>
      html,
      body {
        height: 100%;
      }

      body {
        display: flex;
        justify-content: center;
        align-items: center;

        color: white;
        text-align: center;

        justify-content: center;

        height: 80%;
      }

        display: flex;
        flex-direction: column;
        align-items: center;

        width: 50%;
        height: 100%;

        padding-top: 20px;

        background-color: #d00000;
        border-radius: 5px;
      }

      .btn-group {
        display: flex;
        flex-direction: column;
      }

        width: 200px;

        padding: 10px 20px;
        margin: 5px;
        margin-top: 20px;

        font-size: 20px;
        color: #bf0603;

        background-color: white;
        border-radius: 10px;
        border: none;
      }
    </style>
    <div class="main-container">
      <div class="form-section">
        <h1>Corte de despesas</h1>
        <div class="btn-group">
          <button class="btn" onclick="carregarCalculadora1()">
            Economia com redução de complicações
          </button>

            Economia com redução de termômetros
          </button>
          <button class="btn" onclick="calcular()">

          </button>
          <button class="btn" onclick="calcular()">

          </button>
        </div>
      </div>
    </div>
  </body>
</html>
